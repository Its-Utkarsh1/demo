spring:
  application:
    name: Lap-Resource-Utilization-Platform

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            debug: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

  refresh-secret: ${JWT_REFRESH_SECRET}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}

logging:
  level:
    com:
      LabResourceUtilizationPlatform:
        Security=DEBUG: