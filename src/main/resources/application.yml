spring:
  application:
    name: Lap-Resource-Utilization-Platform

  datasource:
    url: jdbc:postgresql://localhost:5432/lab_resource_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true